<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>UFCC — Unofficial Football Club Championship</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>UFCC</h1>
      <span class="sub">Unofficial Football Club Championship</span>
    </div>
    <button type="button" class="mini-champ" id="mini-champ" aria-hidden="true" aria-label="Back to top">
      <div class="mini-crest" id="mini-crest"></div>
      <div class="mini-meta">
        <div class="mini-name" id="mini-name">—</div>
        <div class="mini-days"><span id="mini-days-n">0</span> days</div>
      </div>
    </button>
  </header>

  <section class="hero" id="hero" aria-label="Current champion">
    <div class="hero-inner">
      <div class="hero-crest" id="hero-crest"></div>
      <div class="hero-text">
        <div class="hero-eyebrow">Current UFCC champion</div>
        <h2 class="hero-name" id="hero-name">—</h2>
        <div class="hero-counter">
          <span class="hero-counter-n" id="hero-days">0</span>
          <span class="hero-counter-l">days as champion</span>
        </div>
        <div class="hero-since" id="hero-since"></div>
      </div>
    </div>
  </section>

  <main class="layout">
    <section class="feed" id="feed" aria-label="Match lineage feed">
      <div class="feed-spacer" id="feed-spacer"></div>
      <div class="feed-content" id="feed-content"></div>
    </section>

    <aside class="timeline" id="timeline" aria-label="Year timeline">
      <div class="timeline-track" id="timeline-track"></div>
      <div class="timeline-thumb" id="timeline-thumb">
        <span id="timeline-year">—</span>
      </div>
    </aside>
  </main>

  <div class="loading" id="loading">Loading lineage…</div>

  <script src="app.js" defer></script>
</body>
</html>
