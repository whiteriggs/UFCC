name: Update nations (UFWC)

on:
  schedule:
    # Cada 15 min (en :05, :20, :35, :50 para no chocar con update-champion.yml,
    # que dispara en el :00/:05). theufwc.com mantiene el linaje oficial y lo
    # re-scrapeamos siempre (es barato); además, si esa web va por detrás,
    # ufwc_live.py sigue al campeón con football-data.org y añade los partidos
    # que falten. Commiteamos sólo si el dataset cambia.
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-nations
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild nations dataset from API
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scrape_ufwc.py

      - name: Commit + push if changed
        run: |
          if [ -n "$(git status --porcelain docs/data-ufwc data/ufwc_base.json)" ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"
            git add docs/data-ufwc data/ufwc_base.json
            git commit -m "chore: update UFWC nations dataset from theufwc.com API"
            # La Action de clubs tambien empuja a main; rebase para evitar
            # rechazos por solape de pushes.
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
