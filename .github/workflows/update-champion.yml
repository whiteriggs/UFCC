name: Update champion

on:
  schedule:
    # Cada hora. football-data.org free permite 10 req/min, así que
    # incluso con varios cambios encadenados de campeón vamos sobrados.
    # El workflow no commitea si no hay cambios reales, así que el ruido
    # en el historial se limita a los días con actividad.
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-champion
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run API update
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python update_from_api.py

      - name: Re-export web data
        run: python export_web.py

      - name: Commit + push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"
            git add -A
            git commit -m "chore: daily champion update from api-football"
            git push
          else
            echo "No changes."
          fi
