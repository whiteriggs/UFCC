name: Update champion (daily)

on:
  schedule:
    # 00:00 Madrid (CEST = UTC+2 en verano, CET = UTC+1 en invierno).
    # Lanzamos ambas para cubrir todo el año sin tocar el cron.
    - cron: "0 22 * * *"  # 00:00 Madrid en verano (CEST)
    - cron: "0 23 * * *"  # 00:00 Madrid en invierno (CET)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-champion
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run API update
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python update_from_api.py

      - name: Re-export web data
        run: python export_web.py

      - name: Commit + push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"
            git add -A
            git commit -m "chore: daily champion update from api-football"
            git push
          else
            echo "No changes."
          fi
