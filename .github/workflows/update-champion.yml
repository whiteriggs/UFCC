name: Update champion

on:
  schedule:
    # Cada 5 minutos. update_from_api.py decide internamente si toca actuar:
    #   - siempre actúa en el minuto :00 (un chequeo horario base)
    #   - también actúa si estamos en la ventana de fin del próximo partido
    #     conocido (kickoff + 95 min … kickoff + 5 h), para reflejar el
    #     resultado con max ~5 min de retraso sin sobrecargar la API.
    # Si no toca, el script hace exit 0 sin commits ni llamadas a la API.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Forzar update aunque no toque (1=sí)"
        required: false
        default: "0"

permissions:
  contents: write

concurrency:
  group: update-champion
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run API update
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          FORCE_UPDATE: ${{ github.event.inputs.force || '0' }}
        run: python update_from_api.py

      - name: Re-export web data
        run: python export_web.py

      - name: Commit + push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name  "github-actions[bot]"
            git add -A
            git commit -m "chore: daily champion update from api-football"
            # La Action de nations tambien empuja a main; rebase para evitar
            # rechazos por solape de pushes.
            git pull --rebase origin main
            git push
          else
            echo "No changes."
          fi
